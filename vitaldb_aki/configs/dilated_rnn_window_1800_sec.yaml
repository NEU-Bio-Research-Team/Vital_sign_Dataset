# 4.5.1 Observation Window Sensitivity: 30 minutes
# Dilated RNN baseline at 30 min observation window
# Resampling configuration
fs_hz: 1.0
max_len_sec: 14400
min_len_sec: 600
min_obs_points_per_channel: 60
# Feature time window / cutoff — 30 MINUTES
cutoff_mode: early_intraop
t_cut_sec: 1800  # 30 minutes
# AKI label windows
baseline_window_sec: 2592000
postop_window_sec: 604800
# Cross-validation (MUST match baseline)
n_splits: 5
random_state: 42
# Performance settings
max_cases_to_cache: null
n_threads: 4
# IO paths
api_base: "https://api.vitaldb.net"
artifacts_dir: "artifacts/new_optional_exp"
cache_dir: "artifacts/new_optional_exp/cache_npz"
tables_dir: "artifacts/new_optional_exp/tables"
scalers_dir: "artifacts/new_optional_exp/scalers"
plots_dir: "artifacts/new_optional_exp/plots"
# Training hyperparameters (MATCH baseline)
epochs: 20
batch_size: 32
lr: 0.001
weight_decay: 0.0001
patience: 5
monitor: pr_auc
device: cuda
# Model architecture
model_hidden_dim: 64
model_num_layers: 2
model_dropout: 0.2
