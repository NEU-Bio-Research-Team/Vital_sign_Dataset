# 4.4.4 Fusion Variant: Early Fusion
# Features concatenated BEFORE processing through RNN stages
# RNN operates on concatenated TCN + input representations early.
# Resampling configuration
fs_hz: 1.0
max_len_sec: 14400
min_len_sec: 600
min_obs_points_per_channel: 60
# Feature time window / cutoff
cutoff_mode: early_intraop
t_cut_sec: 3600
# AKI label windows
baseline_window_sec: 2592000
postop_window_sec: 604800
# Cross-validation (MUST match baseline)
n_splits: 5
random_state: 42
# Performance settings
max_cases_to_cache: null
n_threads: 4
# IO paths
api_base: "https://api.vitaldb.net"
artifacts_dir: "artifacts/new_optional_exp"
cache_dir: "artifacts/new_optional_exp/cache_npz"
tables_dir: "artifacts/new_optional_exp/tables"
scalers_dir: "artifacts/new_optional_exp/scalers"
plots_dir: "artifacts/new_optional_exp/plots"
# Training hyperparameters (MATCH baseline)
epochs: 20
batch_size: 32
lr: 0.001
weight_decay: 0.0001
patience: 5
monitor: pr_auc
device: cuda
# Model architecture for temporal_synergy early fusion variant
model_hidden_dim: 64
model_num_layers: 2
model_dropout: 0.2
# Temporal Synergy specific params
model_tcn_levels: 4
model_rnn_layers: 4
model_cell_type: lstm
model_use_attention: true
